<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Idle Garden</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0A0704}
body{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  font-family:Georgia,'Times New Roman',serif;color:#C8B08A;
}
#app{
  width:1140px;max-width:100%;height:100vh;max-height:100vh;
  border:3px solid #6B4526;border-radius:14px;overflow:hidden;
  box-shadow:0 0 80px rgba(0,0,0,.9),0 0 160px rgba(90,50,10,.12);
  display:flex;flex-direction:column;
}

/* ─── HEADER ─── */
#hdr{
  background:linear-gradient(135deg,#1A0D05,#241407);
  padding:11px 22px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid #5C3520;flex-shrink:0;
}
#coins-wrap{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:bold;color:#F9A825}
#game-title{font-size:15px;letter-spacing:5px;text-transform:uppercase;color:#B09070;font-weight:normal}
#weather-ind{min-width:130px;text-align:right;font-size:10px}
.w-badge{display:inline-block;padding:4px 9px;border-radius:7px;font-size:11px;font-weight:bold;line-height:1.3;border:1px solid}
.w-next{color:#3A2A18;font-size:10px;letter-spacing:.3px}

/* ─── NOTIFICATIONS ─── */
#notif-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;min-width:320px;max-width:600px}
.notif{padding:7px 18px;border-radius:7px;font-size:12px;font-weight:bold;letter-spacing:.3px;font-family:'Courier New',monospace;border:1px solid;white-space:nowrap;animation:notifAnim 4s forwards;background:rgba(0,0,0,.88)}
@keyframes notifAnim{0%{opacity:0;transform:translateY(-10px)}8%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-6px)}}

/* ─── AUTH MODAL ─── */
#auth-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
#auth-box{
  background:#0E0A06;border:2px solid #5C3520;border-radius:14px;
  padding:28px 32px;width:min(360px,92vw);display:flex;flex-direction:column;
  align-items:center;gap:12px;box-shadow:0 16px 60px rgba(0,0,0,.8);
}
#auth-logo{font-size:42px;line-height:1}
#auth-title{font-size:18px;font-weight:bold;color:#C8B08A;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
#auth-tabs{display:flex;gap:6px;width:100%}
.auth-tab{
  flex:1;background:#140C04;border:1px solid #2E1E0E;color:#7A6040;
  border-radius:7px;padding:7px;font-size:12px;cursor:pointer;
  font-family:inherit;font-weight:bold;transition:all .15s;
}
.auth-tab.active{background:#2A1608;border-color:#7A5230;color:#C8A060}
.auth-tab:hover:not(.active){border-color:#5C3520;color:#A08050}
#auth-user,#auth-pass{
  width:100%;background:#0A0602;border:1.5px solid #3D2B1F;border-radius:8px;
  padding:10px 14px;color:#C8B08A;font-size:13px;font-family:inherit;outline:none;
  transition:border-color .15s;box-sizing:border-box;
}
#auth-user:focus,#auth-pass:focus{border-color:#7A5230}
#auth-err{font-size:11px;color:#E57373;min-height:16px;text-align:center;width:100%}
#auth-submit{
  width:100%;background:linear-gradient(135deg,#3D6B22,#4E8A2C);color:#D4EDBA;
  border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:bold;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
#auth-submit:hover{background:linear-gradient(135deg,#4E8A2C,#60A838)}
#auth-guest{
  background:none;border:none;color:#5A4030;font-size:10px;cursor:pointer;
  font-family:inherit;text-decoration:underline;padding:0;
}
#auth-guest:hover{color:#8A7060}
#inv-panel{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(680px,96vw);max-height:82vh;
  background:#0E0A06;border:2px solid #5C3520;border-radius:12px;
  z-index:150;box-shadow:0 12px 60px rgba(0,0,0,.85);
  display:none;flex-direction:column;overflow:hidden;
}
#inv-hdr{
  background:linear-gradient(135deg,#1A0D05,#241407);
  padding:11px 16px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #3D2B1F;flex-shrink:0;
}
#inv-title{color:#C8B08A;font-size:14px;font-weight:bold;letter-spacing:2px}
#inv-tabs{display:flex;gap:6px;padding:10px 14px 6px;flex-shrink:0}
.inv-tab{
  background:#140C04;border:1px solid #2E1E0E;color:#7A6040;
  border-radius:6px;padding:5px 14px;font-size:11px;cursor:pointer;
  font-family:inherit;font-weight:bold;letter-spacing:.5px;transition:all .15s;
}
.inv-tab.active{background:#2A1608;border-color:#7A5230;color:#C8A060}
.inv-tab:hover:not(.active){border-color:#5C3520;color:#A08050}
#inv-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:8px;padding:10px 14px 14px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:#3D2B1F transparent;
}
#inv-empty{color:#5A4030;font-size:12px;font-style:italic;padding:24px;text-align:center}
.inv-card{
  background:#140C04;border:1px solid #2E1E0E;border-radius:9px;
  padding:9px 8px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:10px;cursor:default;transition:border-color .15s;
}
.inv-card:hover{border-color:#5C3520}
.inv-card-type{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:bold;letter-spacing:.5px}
.inv-card-type.seed{background:#0A1C06;color:#7CB342;border:1px solid #1E4A10}
.inv-card-type.fruit{background:#1E0A06;color:#E07030;border:1px solid #4A1A08}
.inv-card-name{color:#C8B08A;font-weight:bold;font-size:11px;text-align:center;line-height:1.2}
.inv-card-trait{color:#7A6040;font-size:9px;text-align:center;line-height:1.4}
.inv-card-val{color:#F9A825;font-weight:bold;font-size:10px;margin-top:2px}
.inv-card-muts{color:#CE93D8;font-size:9px;text-align:center;min-height:12px}
#adm-panel{
  display:none;position:fixed;bottom:18px;right:18px;width:265px;
  z-index:200;background:#060C06;border:1.5px solid #00FF41;border-radius:9px;
  font-family:'Courier New',monospace;
  box-shadow:0 0 40px #00FF4122,0 4px 20px rgba(0,0,0,.6);
  max-height:80vh;overflow:hidden;display:none;flex-direction:column;
}
#adm-titlebar{background:#00FF4112;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #00FF4125;cursor:default}
#adm-titlebar>span{color:#00FF41;font-size:10px;letter-spacing:3px;text-shadow:0 0 8px #00FF4166}
#adm-body{padding:11px 12px;overflow-y:auto;max-height:calc(80vh - 36px);scrollbar-width:thin;scrollbar-color:#00FF4130 transparent}
.adm-section{margin-bottom:11px}
.adm-label{font-size:8px;letter-spacing:2.5px;color:#007A20;margin-bottom:5px;text-transform:uppercase}
.adm-btns{display:flex;flex-wrap:wrap;gap:4px}
.adm-btn{background:#050E05;border:1px solid #00FF4130;border-radius:4px;color:#00FF41;font-size:9px;font-family:'Courier New',monospace;padding:4px 8px;cursor:pointer;letter-spacing:.4px;transition:all .12s}
.adm-btn:hover{background:#00FF4112;border-color:#00FF41;box-shadow:0 0 6px #00FF4133}

/* ─── MIDDLE ROW ─── */
#mid{display:flex;flex:1;min-height:0;align-items:stretch;}

/* ─── GARDEN SIDE ─── */
#garden-side{flex:1;min-width:0;display:flex;flex-direction:column;}

/* ─── PLANTING BAR ─── */
#pbar{
  background:#0C1A07;border-bottom:1px solid #1C3810;
  padding:6px 18px;display:none;align-items:center;justify-content:space-between;flex-shrink:0;
}
#pbar.show{display:flex}
#pbar-txt{font-size:12px;color:#7CB342}
.sm-btn{
  background:#161F10;color:#6D8060;border:1px solid #253018;border-radius:5px;
  padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;margin-left:6px;transition:all .15s;
}
.sm-btn:hover{background:#1E2E16;color:#A5D6A7}

/* ─── GARDEN WRAP ─── */
#gwrap{position:relative;overflow:hidden;flex:1;min-height:0;}
#gsvg{width:100%;height:100%;display:block;cursor:default;}
#gsvg.crosshair{cursor:crosshair}

/* ─── TOOLTIP ─── */
#tt{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(12,7,2,.97);border:1.5px solid #5C3520;
  border-radius:11px;padding:11px 14px;
  display:none;align-items:center;gap:12px;
  z-index:20;box-shadow:0 6px 28px rgba(0,0,0,.8);min-width:280px;white-space:nowrap;
}
#tt.show{display:flex}
#fruit-tt{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(12,7,2,.97);border:1.5px solid #7A5230;
  border-radius:11px;padding:10px 14px;
  display:none;align-items:center;gap:12px;
  z-index:21;box-shadow:0 6px 28px rgba(0,0,0,.8);min-width:240px;white-space:nowrap;
}
#fruit-tt.show{display:flex}
#ftt-name{font-size:13px;font-weight:bold;color:#D7C4A0}
#ftt-size{font-size:11px;color:#90A4AE;margin-top:2px}
#ftt-muts{font-size:11px;color:#CE93D8;margin-top:2px;min-height:14px}
#ftt-val{font-size:12px;color:#F9A825;margin-top:3px;font-weight:bold}
#ftt-acts{display:flex;flex-direction:column;gap:5px;min-width:94px}
#tt-name{font-size:15px;font-weight:bold;color:#D7C4A0}
#tt-stage{font-size:11px;color:#A5D6A7;margin-top:3px}
#tt-detail{font-size:11px;color:#CE93D8;margin-top:2px}
#tt-val{font-size:11px;color:#F9A825;margin-top:2px;min-height:15px}
#tt-acts{display:flex;flex-direction:column;gap:5px;min-width:100px}
.tbt{
  border:none;border-radius:6px;padding:7px 10px;font-size:11px;font-weight:bold;
  cursor:pointer;font-family:inherit;width:100%;text-align:center;transition:all .15s;
}
.tbt.do-harv{background:linear-gradient(135deg,#C84B00,#E87000);color:#fff}
.tbt.do-harv:hover{background:linear-gradient(135deg,#E65C00,#FF8A00)}
.tbt.do-rem{background:#141E14;color:#6D8060;border:1px solid #253018}
.tbt.do-rem:hover{background:#1C2E1C;color:#A5D6A7}
.tbt.do-cls{background:transparent;color:#3A3A3A;border:1px solid #282828;font-size:10px}
.tbt.do-cls:hover{color:#666;border-color:#444}

/* ─── SHOP PANEL (right) ─── */
#shop-panel{
  width:244px;flex-shrink:0;
  background:#0A0602;
  border-left:2px solid #5C3520;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#shop-hdr{
  background:linear-gradient(180deg,#1A0D05,#130A03);
  padding:11px 14px 9px;
  border-bottom:1px solid #3D2B1F;
  flex-shrink:0;
}
#shop-hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
#shop-label{font-size:13px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;color:#9E8060}
#restock-wrap{text-align:right}
#restock-label{font-size:9px;color:#5A4A30;letter-spacing:.5px;text-transform:uppercase}
#restock-timer{font-size:13px;color:#7CB342;font-weight:bold;letter-spacing:1px;display:block;line-height:1.1;margin-top:1px}
#restock-bar-bg{height:4px;background:#1C1208;border-radius:2px;overflow:hidden}
#restock-bar-fill{height:100%;background:linear-gradient(90deg,#2E6B14,#5CA020);border-radius:2px;width:100%;transition:width .9s linear}

/* scrollable area */
#shop-scroll{
  flex:1;overflow-y:auto;padding:10px 10px 14px;
  display:flex;flex-direction:column;gap:8px;
  scrollbar-width:thin;scrollbar-color:#3D2B1F #0A0602;
}
#shop-scroll::-webkit-scrollbar{width:5px}
#shop-scroll::-webkit-scrollbar-track{background:#0A0602}
#shop-scroll::-webkit-scrollbar-thumb{background:#3D2B1F;border-radius:4px}

/* shop cards */
.scard{
  background:#140C04;border:1.5px solid #2E1E0E;border-radius:10px;
  padding:9px 10px;cursor:pointer;display:flex;align-items:center;gap:9px;
  transition:all .18s;position:relative;
}
.scard:hover:not(.broke){border-color:#6B4020;background:#1C1208;transform:translateX(-2px);box-shadow:3px 0 14px rgba(0,0,0,.5)}
.scard.sel{border-color:#7CB342;background:#091506;}
.scard.broke{opacity:.38;cursor:not-allowed}
.sc-info{flex:1;min-width:0}
.sc-name{color:#C8B08A;font-size:12px;font-weight:bold;line-height:1.2}
.sc-row{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.sc-cost{color:#F9A825;font-size:10px;font-weight:bold}
.sc-sell{color:#81C784;font-size:9px;opacity:.85}
.sc-meta{font-size:9px;color:#4A6040;margin-top:2px}
.sc-type{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:bold;display:inline-block;margin-top:3px}
.sc-type.multi{background:#0E2A08;color:#7CB342;border:1px solid #1E4A10}
.sc-type.single{background:#2A1208;color:#E07030;border:1px solid #4A2010}
.sc-stock{
  display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;margin-top:3px;
  font-weight:bold;letter-spacing:.3px;
}
.sc-stock.ok{background:#0A200A;color:#5CA020;border:1px solid #1A3A10}
.sc-stock.low{background:#1E1A04;color:#D4A020;border:1px solid #3A3010}
.sc-stock.out{background:#1E0808;color:#A03030;border:1px solid #3A1010}

/* ─── FOOTER ─── */
#ftr{
  background:linear-gradient(135deg,#1A0D05,#241407);
  border-top:2px solid #5C3520;padding:9px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  flex-shrink:0;
}
#ftr-stats{font-size:11px;color:#5C4A30}
#ftr-hint{font-size:10px;color:#3A2A18;font-style:italic}
#sell-all{
  background:linear-gradient(135deg,#B84800,#D96500);color:#fff;
  border:none;border-radius:7px;padding:7px 14px;font-weight:bold;
  font-size:12px;cursor:pointer;font-family:inherit;display:none;
  box-shadow:0 2px 10px rgba(180,70,0,.35);transition:all .15s;
}
#sell-all.show{display:block}
#sell-all:hover{background:linear-gradient(135deg,#D95500,#F07800)}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="hdr">
  <div id="coins-wrap">
    <svg id="coin-logo" width="22" height="22" viewBox="0 0 22 22" style="cursor:pointer;flex-shrink:0" title="…">
      <circle cx="11" cy="11" r="10" fill="#F9A825" stroke="#D06000" stroke-width="1.5"/>
      <text x="11" y="15.5" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="serif">$</text>
    </svg>
    <input type="file" id="cheat-file" style="display:none" accept="*/*">
    <span id="coins">60</span>
  </div>
  <div id="game-title">Idle Garden</div>
  <div style="display:flex;align-items:center;gap:8px">
    <button id="inv-btn" class="hdr-btn">🎒 Bag</button>
    <span id="save-ind" style="font-size:9px;color:#4A6A30;letter-spacing:.5px;display:none">● SAVED</span>
    <span id="user-badge" style="font-size:10px;color:#7A6040;display:none"></span>
    <button id="logout-btn" class="hdr-btn" style="display:none;background:#4A2020" onclick="doLogout()">Log Out</button>
    <div id="weather-ind"><span class="w-next">☁ weather incoming…</span></div>
  </div>
</div>

<!-- MIDDLE -->
<div id="mid">

  <!-- GARDEN SIDE -->
  <div id="garden-side">
    <!-- Planting bar -->
    <div id="pbar">
      <span id="pbar-txt"></span>
      <div>
        <button class="sm-btn" id="stop-btn">■ Pause</button>
        <button class="sm-btn" id="desel-btn">✕ Deselect</button>
      </div>
    </div>
    <!-- Garden SVG -->
    <div id="gwrap">
      <div id="notif-bar"></div>
      <svg id="gsvg" viewBox="0 0 920 490">
        <defs>
          <!-- Sky gradient — warm golden-hour feel -->
          <linearGradient id="sky-g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#4A90D9"/>
            <stop offset="45%"  stop-color="#87CEEB"/>
            <stop offset="75%"  stop-color="#C8E8F5"/>
            <stop offset="100%" stop-color="#D9EFC2"/>
          </linearGradient>
          <!-- Deep rich soil -->
          <linearGradient id="soil-g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#6B4226"/>
            <stop offset="30%"  stop-color="#52301A"/>
            <stop offset="100%" stop-color="#2C1608"/>
          </linearGradient>
          <!-- Lush grass with slight perspective -->
          <linearGradient id="grass-g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#4CAF50"/>
            <stop offset="55%"  stop-color="#388E3C"/>
            <stop offset="100%" stop-color="#2E7D32"/>
          </linearGradient>
          <!-- Path strip -->
          <linearGradient id="path-g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#C4A873"/>
            <stop offset="100%" stop-color="#A68650"/>
          </linearGradient>
          <!-- Sun -->
          <radialGradient id="sun-g" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FFFDE7"/>
            <stop offset="55%"  stop-color="#FFE082"/>
            <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
          </radialGradient>
          <!-- Soil texture -->
          <pattern id="pt-soil" patternUnits="userSpaceOnUse" width="40" height="40">
            <rect width="40" height="40" fill="transparent"/>
            <ellipse cx="8"  cy="12" rx="4" ry="1.5" fill="#3A1C08" opacity=".4" transform="rotate(-12 8 12)"/>
            <ellipse cx="28" cy="7"  rx="5" ry="1.5" fill="#5C3010" opacity=".3" transform="rotate(8 28 7)"/>
            <ellipse cx="16" cy="28" rx="4.5" ry="1.5" fill="#3A1C08" opacity=".35" transform="rotate(15 16 28)"/>
            <ellipse cx="34" cy="22" rx="3.5" ry="1.2" fill="#5C3010" opacity=".28" transform="rotate(-6 34 22)"/>
            <ellipse cx="5"  cy="34" rx="3" ry="1"   fill="#3A1C08" opacity=".38" transform="rotate(20 5 34)"/>
            <circle cx="22" cy="18" r="1.2" fill="#2C1408" opacity=".22"/>
            <circle cx="12" cy="5"  r=".9"  fill="#6B3A18" opacity=".2"/>
          </pattern>
          <!-- Grass texture -->
          <pattern id="pt-grass" patternUnits="userSpaceOnUse" width="24" height="24">
            <rect width="24" height="24" fill="transparent"/>
            <rect x="4"  y="0" width="1.5" height="8"  rx=".7" fill="#66BB6A" opacity=".35" transform="rotate(-3 4 8)"/>
            <rect x="12" y="2" width="1.2" height="7"  rx=".6" fill="#81C784" opacity=".3"  transform="rotate(4 12 9)"/>
            <rect x="20" y="0" width="1.5" height="9"  rx=".7" fill="#66BB6A" opacity=".32" transform="rotate(-5 20 9)"/>
            <rect x="8"  y="14" width="1.2" height="6" rx=".6" fill="#A5D6A7" opacity=".25" transform="rotate(3 8 20)"/>
          </pattern>
          <!-- Planting-row furrow -->
          <linearGradient id="furrow-g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#3A1C08" stop-opacity=".6"/>
            <stop offset="100%" stop-color="#1A0A02" stop-opacity=".8"/>
          </linearGradient>
          <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000060"/>
          </filter>
        </defs>

        <!-- ─ Sky ─ -->
        <rect width="920" height="490" fill="url(#sky-g)"/>

        <!-- ─ Sun with soft corona ─ -->
        <circle cx="78" cy="62" r="70" fill="url(#sun-g)" opacity=".5"/>
        <circle cx="78" cy="62" r="38" fill="#FFF8E1" opacity=".92"/>
        <circle cx="78" cy="62" r="32" fill="#FFE082"/>
        <!-- Sun rays -->
        <g stroke="#FFD54F" stroke-linecap="round" opacity=".45">
          <line x1="78" y1="16" x2="78" y2="8" stroke-width="2.5"/>
          <line x1="78" y1="108" x2="78" y2="116" stroke-width="2.5"/>
          <line x1="32" y1="62" x2="24" y2="62" stroke-width="2.5"/>
          <line x1="124" y1="62" x2="132" y2="62" stroke-width="2.5"/>
          <line x1="45" y1="29" x2="39" y2="23" stroke-width="2"/>

// Randomise stock on load — common always has some, higher rarities often start empty
(function initStock(){
  const R={
    common:    ()=>4+Math.floor(Math.random()*7),        // 4-10, always some
    uncommon:  ()=>Math.random()<0.3?0:1+Math.floor(Math.random()*6), // 30% empty
    rare:      ()=>Math.random()<0.5?0:1+Math.floor(Math.random()*3), // 50% empty
    epic:      ()=>Math.random()<0.65?0:1+Math.floor(Math.random()*2),// 65% empty
    legendary: ()=>Math.random()<0.8?0:1,                // 80% empty
    mythic:    ()=>Math.random()<0.9?0:1,                // 90% empty
  };
  Object.keys(STOCK).forEach(k=>{
    const d=DEFS[k];if(!d)return;
    STOCK[k].current=Math.min(STOCK[k].max,(R[d.rarity]||R.common)());
  });
})();
const RESTOCK_MS = 150000; // 2.5 min = 150 sec
function nextRestockBoundary(){ return Math.ceil(Date.now()/RESTOCK_MS)*RESTOCK_MS; }
let nextRestockAt = nextRestockBoundary();

function doRestock(silent=false) {
  Object.keys(STOCK).forEach(k => {
    const d = DEFS[k]; if(!d) return;
    const r = RARITIES[d.rarity];
    if(Math.random() < r.restockChance) {
      const s = STOCK[k];
      s.current = Math.min(s.max, s.current + 1 + Math.floor(Math.random() * r.restockAmt));
    }
  });
  nextRestockAt = nextRestockBoundary();
  if(!silent) showNotif('🌿 Shop restocked!', '#7CB342');
  renderShop();
}

      E(-5,-42,18,3,'#388E3C',-20)+E(5,-56,17,3,'#388E3C',20)+
      E(-4,-64,13,2.5,'#4CAF50',-15)+E(4,-70,11,2.2,'#4CAF50',15)+
      E(13,-38,5.5,11,'#4A7C20',0)+E(13,-38,4.5,10,'#5D8A2A',0)+E(13,-38,3.5,8,'#FDD835',0)+
      L(14,-29,17,-23,'#FFFDE7',1.5)+L(15,-30,18,-24,'#FFFDE7',1)+
      L(0,-72,0,-80,'#558B2F',2)+E(-5,-75,7,1.8,'#7CB342',-20)+E(5,-75,7,1.8,'#7CB342',20)+E(0,-79,6,1.5,'#7CB342',0);

// ══════════════════════════════════════
function oneFruitSVG(type,progress){
  const rdy=progress>=1;
  const p=Math.min(1,progress);
  if(type==='tomato'){
    const r=Math.max(1.8,6.5*(rdy?1:p*0.82));
    const fill=rdy?'#D32F2F':p<0.35?'#2E7D32':p<0.7?'#FF7043':'#E53935';
    const stem=L(0,-3,0,-1,'#3D6B1A',1);
    const calyx=rdy?`<path d="M${f(-r*.5)},0 Q0,${f(-r*.25)} ${f(r*.5)},0" stroke="#388E3C" stroke-width="1.2" fill="none"/>`:'';
    const hl=rdy?C(f(-r*.35),f(r*.65),f(r*.28),'#FF8A80','0.55'):'';
    return stem+calyx+C(0,f(r),f(r),fill)+hl;
  }
  if(type==='strawberry'){
    const r=Math.max(1.8,5.5*(rdy?1:p*0.78));
    const stem=L(0,-3,0,-1,'#3D6B1A',1);
    const calyx=rdy?E(0,0,f(r*.8),f(r*.4),'#388E3C',0):'';
    if(rdy)return stem+calyx+
      // Wide at top (y=0 near calyx), curves inward then tapers to point at bottom (y = r*2.6)
      `<path d="M${f(-r)},0 Q${f(-r*1.1)},${f(r*.8)} ${f(-r*.6)},${f(r*1.6)} Q${f(-r*.2)},${f(r*2.2)} 0,${f(r*2.6)} Q${f(r*.2)},${f(r*2.2)} ${f(r*.6)},${f(r*1.6)} Q${f(r*1.1)},${f(r*.8)} ${f(r)},0 Z" fill="#D81B60"/>`+
      // Highlight near top-left
      C(f(-r*.35),f(r*.45),f(r*.25),'#FF80AB','0.55');
    return stem+C(0,f(r),f(r),p<0.4?'#E8F5E9':'#FFCDD2');
  }
  if(type==='pepper'){
    const h=Math.max(3,11*(rdy?1:p*0.8));
    const w=Math.max(1.4,4*(rdy?1:p*0.8));
    const fill=rdy?'#D32F2F':p<0.5?'#2E7D32':'#FF9800';
    const cap=L(0,-4,0,-1,'#3D6B1A',1)+`<ellipse cx="0" cy="0" rx="${f(w*.7)}" ry="${f(w*.4)}" fill="#388E3C"/>`;
    const hl=rdy?E(f(-w*.35),f(h*.45),f(w*.38),f(h*.5),'#FF8A80',0,'0.4'):'';
    return cap+E(0,f(h),f(w),f(h),fill)+hl;
  }
  if(type==='cucumber'){
    // Long cylinder hanging from stem at (0,0)
    const h=Math.max(3,16*(rdy?1:p*0.8));
    const w=Math.max(1.5,4.5*(rdy?1:p*0.8));
    const fill=rdy?'#2E7D32':p<0.3?'#C8E6C9':'#388E3C';
    const stem=L(0,-4,0,-1,'#3D6B1A',1.2)+`<ellipse cx="0" cy="0" rx="${f(w*.6)}" ry="${f(w*.4)}" fill="#4CAF50"/>`;
    if(rdy){
      // Bumpy skin lines on cucumber
      const bumps=[0.2,0.4,0.6,0.8].map(t=>
        `<ellipse cx="${f(w*.15)}" cy="${f(h*t*2-2)}" rx="${f(w*.35)}" ry="${f(w*.28)}" fill="#1B5E20" opacity="0.3"/>`
      ).join('');
      const hl=`<ellipse cx="${f(-w*.3)}" cy="${f(h*.6)}" rx="${f(w*.22)}" ry="${f(h*.55)}" fill="#66BB6A" opacity="0.4"/>`;
      const tip=`<ellipse cx="0" cy="${f(h*2)}" rx="${f(w*.6)}" ry="${f(w*.5)}" fill="#1B5E20" opacity="0.7"/>`;
      return stem+E(0,f(h),f(w),f(h),fill)+bumps+hl+tip;
    }
    return stem+E(0,f(h),f(w),f(h),fill,'0','0.85');
  }
  if(type==='lettuce'){
    // Head grows UPWARD from attach point (0,0)
    if(rdy)return E(0,-9,14,9,'#4CAF50',0)+E(0,-9,10,7,'#66BB6A',0)+E(0,-9,6,4,'#A5D6A7',0)+E(0,-9,3,2.2,'#DCEDC8',0);
    const sc=Math.max(.25,p);
    return E(0,f(-9*sc),f(14*sc),f(9*sc),'#81C784',0,'0.65');
  }
  if(type==='eggplant'){
    const h=Math.max(3,13*(rdy?1:p*0.8));const w=Math.max(2,5.5*(rdy?1:p*0.8));
    const fill=rdy?'#6A1B9A':p<0.4?'#C5CAE9':'#9C27B0';
    const cap=L(0,-4,0,-1,'#3D6B1A',1.5)+E(0,0,f(w*.7),f(w*.4),'#388E3C',0);
    const hl=rdy?E(f(-w*.3),f(h*.5),f(w*.28),f(h*.38),'#CE93D8',0,'0.5'):'';
    return cap+E(0,f(h),f(w),f(h),fill)+hl;
  }
  if(type==='raspberry'){
    const r=Math.max(1.5,4*(rdy?1:p*0.75));
    if(rdy){
      const d2=r*.7,cy=r*1.2;
      return `<circle r="1.2" fill="#2E7D32"/>` +
        `<circle cx="0" cy="${f(cy-r)}" r="${f(d2)}" fill="#C62828"/>` +
        `<circle cx="${f(-r*.8)}" cy="${f(cy-r*.4)}" r="${f(d2)}" fill="#D32F2F"/>` +
        `<circle cx="${f(r*.8)}" cy="${f(cy-r*.4)}" r="${f(d2)}" fill="#C62828"/>` +
        `<circle cx="${f(-r*.5)}" cy="${f(cy+r*.4)}" r="${f(d2)}" fill="#E53935"/>` +
        `<circle cx="${f(r*.5)}" cy="${f(cy+r*.4)}" r="${f(d2)}" fill="#D32F2F"/>` +
        `<circle cx="0" cy="${f(cy+r*.2)}" r="${f(d2*.8)}" fill="#B71C1C" opacity=".6"/>`;
    }
    return C(0,f(r),f(r),p<0.4?'#FFCDD2':'#EF9A9A');
  }
  if(type==='blueberry'){
    const r=Math.max(1.5,4.5*(rdy?1:p*0.78));
    const fill=rdy?'#4527A0':p<0.35?'#C5CAE9':'#7986CB';
    if(rdy){
      const crown=`<path d="M${f(-r*.5)},0 L${f(-r*.2)},${f(-r*.35)} L0,0 L${f(r*.2)},${f(-r*.35)} L${f(r*.5)},0" fill="#1B5E20"/>`;
      return crown+C(0,f(r),f(r),fill)+C(f(-r*.35),f(r*.7),f(r*.25),'#7986CB','0.55');
    }
    return C(0,f(r),f(r),fill,'0.8');
  }
  if(type==='chilli'){
    const h=Math.max(3,14*(rdy?1:p*0.82));const w=Math.max(1.2,3*(rdy?1:p*0.82));
    const fill=rdy?'#C62828':p<0.45?'#2E7D32':'#FF6F00';
    const cap=L(0,-4,0,-1,'#3D6B1A',1)+E(0,0,f(w*.8),f(w*.45),'#388E3C',0);
    return cap+`<path d="M${f(-w)},0 Q${f(-w*1.1)},${f(h*.5)} 0,${f(h*2)} Q${f(w*1.1)},${f(h*.5)} ${f(w)},0 Z" fill="${fill}"/>`;
  }
  if(type==='mango'){
    const h=Math.max(3,14*(rdy?1:p*0.8));
    const w=Math.max(2,9*(rdy?1:p*0.8));
    const stem=L(0,-4,0,-1,'#5A3820',1.5);
    if(rdy){
      const leaf=`<ellipse cx="4" cy="-2" rx="5" ry="2.2" fill="#4CAF50" transform="rotate(25 4 -2)"/>`;
      return stem+leaf+
        `<ellipse cx="-1" cy="${f(h*.7)}" rx="${f(w)}" ry="${f(h)}" fill="#F57C00"/>`+
        `<ellipse cx="-1" cy="${f(h*.7)}" rx="${f(w*.85)}" ry="${f(h*.85)}" fill="#FF8F00" opacity="0.55"/>`+
        `<ellipse cx="${f(w*.35)}" cy="${f(h*.45)}" rx="${f(w*.5)}" ry="${f(h*.45)}" fill="#E53935" opacity="0.32"/>`+
        `<ellipse cx="${f(-w*.3)}" cy="${f(h*.9)}" rx="${f(w*.3)}" ry="${f(h*.28)}" fill="#FFEE58" opacity="0.42"/>`;
    }
    const col=p<0.4?'#A5D6A7':p<0.7?'#66BB6A':'#FFF176';
    return stem+E(-1,f(h*.7),f(w),f(h),col,'0','0.85');
  }
  if(type==='dragonfruit'){
    const r=Math.max(2,9*(rdy?1:p*0.8));
    const stem=L(0,-4,0,-1,'#2E7D32',1.5)+E(0,0,f(r*.35),f(r*.2),'#388E3C',0);
    if(rdy){
      const finAngles=[-130,-100,-70,-50,50,70,100,130];
      const finStr=finAngles.map(a=>{
        const rad=a*Math.PI/180;
        const fx=(Math.cos(rad)*r*1.05).toFixed(1);
        const fy=(r*1.1+Math.sin(rad)*r*0.95).toFixed(1);
        return `<ellipse cx="${fx}" cy="${fy}" rx="2.8" ry="7" fill="${Math.abs(a)>90?'#2E7D32':'#388E3C'}" transform="rotate(${a} ${fx} ${fy})"/>`;
      }).join('');
      return stem+finStr+C(0,f(r*1.1),f(r),'#E91E63')+C(f(-r*.3),f(r*.8),f(r*.28),'#F48FB1','0.55');
    }
    return stem+C(0,f(r*1.1),f(r),p<0.4?'#FCE4EC':'#F48FB1');
  }
  return '';
}

// PRICE CALCULATION (scale + mutation)
// ══════════════════════════════════════
function calcFruitPrice(type, fr){
  const base=DEFS[type].fruitSell;
  const sizeMult=Math.pow(Math.max(0.5,fr.scale||1), 1.6);
  const mutMult=(fr.mutations||[]).reduce((acc,m)=>acc*(WEATHER_TYPES[m]?.sellMult||1),1);
  return Math.max(1,Math.round(base*sizeMult*mutMult));
}
function calcPlantPrice(p){
  const base=DEFS[p.type].sell;
  const sizeMult=Math.pow(Math.max(0.5,p.sizeScale||1), 1.6);
  const mutMult=(p.mutations||[]).reduce((acc,m)=>acc*(WEATHER_TYPES[m]?.sellMult||1),1);
  return Math.max(1,Math.round(base*sizeMult*mutMult));
}

function spawnWeather(){
  const keys=Object.keys(WEATHER_TYPES);
  const type=keys[Math.floor(Math.random()*keys.length)];
  const wd=WEATHER_TYPES[type];
  activeWeathers=activeWeathers.filter(aw=>aw.type!==type);

  showNotif(`${wd.icon} ${wd.label} rolls in!`, wd.color);
}

// Assign a random grow point and random scale to a fruit slot when it starts growing
function startFruitGrowing(fr, type){
  const gps = GROW_POINTS[type] || [];
  fr.startedAt = Date.now();
  fr.gpIdx     = Math.floor(Math.random() * gps.length);
  fr.scale     = 0.70 + Math.random() * 0.62;
  fr.mutations = [];
}

// Render one fruit at its stored grow point and scale
function mutationFX(mut, scale, isRipe){
  const s=scale||1;
  if(!isRipe) return '';
  switch(mut){
    case 'rain':
      return [-3,0,3].map((ox,i)=>`<ellipse cx="${ox}" cy="${(s*8+i*3).toFixed(1)}" rx="${(s*1.2).toFixed(1)}" ry="${(s*2.8).toFixed(1)}" fill="#64B5F6" opacity="0.75"><animate attributeName="cy" values="${(s*5).toFixed(1)};${(s*18).toFixed(1)};${(s*5).toFixed(1)}" dur="${(0.9+i*0.3).toFixed(1)}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="${(0.9+i*0.3).toFixed(1)}s" repeatCount="indefinite"/></ellipse>`).join('');

        `<circle r="${(s*13).toFixed(1)}" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0"><animate attributeName="opacity" values="0;0;0;0.6;0;0;0;0;0" dur="1.8s" repeatCount="indefinite"/></circle>`;

        `<circle r="${(s*2.5).toFixed(1)}" fill="#E3F2FD" opacity="0.6"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/></circle>`;
    case 'heatwave':
      return [0,1,2].map(i=>`<circle r="${(s*(6+i*5)).toFixed(1)}" fill="none" stroke="#FF7043" stroke-width="${(1.5-i*0.4).toFixed(1)}" opacity="0"><animate attributeName="r" values="${(s*(4+i*5)).toFixed(1)};${(s*(14+i*5)).toFixed(1)}" dur="${(1.2+i*0.4).toFixed(1)}s" begin="${(i*0.4).toFixed(1)}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="${(1.2+i*0.4).toFixed(1)}s" begin="${(i*0.4).toFixed(1)}s" repeatCount="indefinite"/></circle>`).join('');
    case 'fog':
      return `<ellipse rx="${(s*14).toFixed(1)}" ry="${(s*6).toFixed(1)}" fill="#B0BEC5" opacity="0"><animate attributeName="opacity" values="0;0.28;0" dur="3s" repeatCount="indefinite"/><animate attributeName="ry" values="${(s*4).toFixed(1)};${(s*8).toFixed(1)};${(s*4).toFixed(1)}" dur="3s" repeatCount="indefinite"/></ellipse>`+
        `<ellipse cx="${(s*6).toFixed(1)}" cy="${(-s*4).toFixed(1)}" rx="${(s*10).toFixed(1)}" ry="${(s*4).toFixed(1)}" fill="#CFD8DC" opacity="0"><animate attributeName="opacity" values="0;0.22;0" dur="4s" begin="1s" repeatCount="indefinite"/></ellipse>`;
    case 'goldenHour':
      return Array.from({length:8},(_,i)=>{const a=i*45,r=a*Math.PI/180;const x1=(Math.cos(r)*s*5).toFixed(1),y1=(Math.sin(r)*s*5).toFixed(1),x2=(Math.cos(r)*s*14).toFixed(1),y2=(Math.sin(r)*s*14).toFixed(1);return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#FFD54F" stroke-width="1.5" opacity="0"><animate attributeName="opacity" values="0;0.9;0" dur="${(1.4+i*0.1).toFixed(1)}s" begin="${(i*0.18).toFixed(2)}s" repeatCount="indefinite"/></line>`;}).join('')+
        `<circle r="${(s*3).toFixed(1)}" fill="#FFE082" opacity="0"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.8s" repeatCount="indefinite"/></circle>`;
    case 'acidRain':
      return [-4,0,4].map((ox,i)=>`<circle cx="${ox}" cy="${(-s*(6+i*4)).toFixed(1)}" r="${(s*1.8).toFixed(1)}" fill="#AED581" opacity="0"><animate attributeName="cy" values="${(s*4).toFixed(1)};${(-s*14).toFixed(1)}" dur="${(1.1+i*0.35).toFixed(2)}s" begin="${(i*0.4).toFixed(1)}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0.8;0" dur="${(1.1+i*0.35).toFixed(2)}s" begin="${(i*0.4).toFixed(1)}s" repeatCount="indefinite"/></circle>`).join('')+
        `<circle r="${(s*9).toFixed(1)}" fill="none" stroke="#C5E1A5" stroke-width="1.2" opacity="0.5" stroke-dasharray="3 4"/>`;
    default: return '';
  }
}

function renderFruit(type, progress, fr){
  const gp = (GROW_POINTS[type] || [])[fr.gpIdx];
  if(!gp) return '';
  const body = oneFruitSVG(type, progress);
  if(!body) return '';
  const s = f(fr.scale || 1);
  const ripe = progress >= 1;
  const mutFX = (fr.mutations||[]).map(mut=>mutationFX(mut, fr.scale||1, ripe)).join('');
  // Large invisible hit area so small fruits are easy to click
  const hitR = Math.max(14, (fr.scale||1) * 14);
  const hitCircle = `<circle r="${f(hitR)}" fill="transparent" style="cursor:${ripe?'pointer':'default'}"/>`;
  return `<g class="fruit-g" transform="translate(${gp.x},${gp.y})" data-ready="${ripe?1:0}" data-fpid="${fr._pid!=null?fr._pid:''}" data-fidx="${fr._idx!=null?fr._idx:0}">${hitCircle}${mutFX}<g class="fruit-body" transform="scale(${s})">${body}</g></g>`;
}

// ══════════════════════════════════════
// RENDER ONE PLANT → SVG STRING
// ══════════════════════════════════════
function renderPlant(p){
  const {id,x,y,stage}=p;
  const def=DEFS[p.type];
  const mature=stage===3;
  const plantProg=mature?1:Math.min(1,(Date.now()-p.plantedAt)/def.grow);
  const body=plantBodySVG(p.type,stage);
  let fruitsStr='',readyCount=0;
  if(def.multiHarvest&&mature&&p.fruits){
    p.fruits.forEach((fr,i)=>{
      fr._pid=id; fr._idx=i;
      const pr=fr.ready?1:fr.startedAt===null?0:Math.min(1,(Date.now()-fr.startedAt)/def.fruitGrow);
      if(fr.ready)readyCount++;
      if(!fr.ready&&fr.startedAt===null)return;
      fruitsStr+=renderFruit(p.type,pr,fr);
    });
  }
  const pb=stage<3?`<rect x="-15" y="5" width="30" height="3.5" rx="1.8" fill="rgba(0,0,0,.5)"/><rect x="-15" y="5" width="${f(30*plantProg)}" height="3.5" rx="1.8" fill="#7CB342"/>`:'' ;
  let fruitPBs='';
  if(def.multiHarvest&&mature&&p.fruits){
    p.fruits.forEach(fr=>{
      if(fr.ready||fr.startedAt===null)return;
      const gp=(GROW_POINTS[p.type]||[])[fr.gpIdx];
      if(!gp)return;
      const pr=Math.min(1,(Date.now()-fr.startedAt)/def.fruitGrow);
      fruitPBs+=`<rect x="${gp.x-8}" y="${gp.y+10}" width="16" height="2.5" rx="1.2" fill="rgba(0,0,0,.4)"/><rect x="${gp.x-8}" y="${gp.y+10}" width="${f(16*pr)}" height="2.5" rx="1.2" fill="#FFCA28"/>`;
    });
  }
  const harvestReady=mature&&(!def.multiHarvest||readyCount>0);
  // Single-harvest plant mutation FX
  let singleMutFX='';
  if(!def.multiHarvest&&mature&&p.mutations&&p.mutations.length>0){
    singleMutFX=p.mutations.map(mut=>mutationFX(mut,p.sizeScale||1,true)).join('');
  }
  // Hit ellipse rendered FIRST (lowest z-order) so fruits drawn after it sit on top
  const hit=`<ellipse cx="0" cy="-24" rx="24" ry="30" fill="transparent" style="cursor:pointer" data-pid="${id}"/>`;
  return `<g data-pid="${id}" transform="translate(${x},${y})" filter="url(#sh)">${hit}${body}${pb}${fruitPBs}${singleMutFX}${fruitsStr}</g>`;
}

// RENDER GARDEN

function renderGarden(){
  document.getElementById('plants-g').innerHTML=[...plants].sort((a,b)=>a.y-b.y).map(renderPlant).join('');

// RENDER SHOP (right panel, always visible)
// ══════════════════════════════════════
function renderShop(){
  const scroll=document.getElementById('shop-scroll');
  const rarityOrder=['common','uncommon','rare','epic','legendary','mythic'];
  const sorted=Object.entries(DEFS).sort((a,b)=>rarityOrder.indexOf(a[1].rarity)-rarityOrder.indexOf(b[1].rarity));
  scroll.innerHTML=sorted.map(([key,d])=>{
    const stock=STOCK[key];
    const canAfford=coins>=d.cost;
    const inStock=stock.current>0;
    const canBuy=canAfford&&inStock;
    const isSel=selSeed===key;
    const rar=RARITIES[d.rarity];
    const stockClass=stock.current===0?'out':stock.current<=2?'low':'ok';
    const stockLabel=stock.current===0?'Sold out':`${stock.current} in stock`;
    const perHarv=d.multiHarvest?`$${d.fruitSell}/fruit · ×${d.fruitSlots}`:`$${d.sell} once`;
    const typeTag=d.multiHarvest
      ?`<span class="sc-type multi">perennial</span>`
      :`<span class="sc-type single">once only</span>`;
    const rarBadge=`<span style="font-size:8px;padding:2px 5px;border-radius:3px;font-weight:bold;display:inline-block;margin-top:2px;background:rgba(0,0,0,.4);color:${rar.color};border:1px solid ${rar.color}44;">${rar.label}</span>`;
    let fp='';
    if(d.multiHarvest&&GROW_POINTS[key]){fp=GROW_POINTS[key].map(gp=>{const body=oneFruitSVG(key,1);return body?`<g transform="translate(${gp.x},${gp.y}) scale(1)">${body}</g>`:''}).join('');}
    const borderCol=isSel?'#7CB342':rar.color+'55';
    const glowStyle=isSel?`box-shadow:0 0 10px ${rar.glow}88;`:'';
    // Icon: ripe fruit for perennials, full plant for single-harvest
    const fruitBody=d.multiHarvest?oneFruitSVG(key,1):'';
    const fruitOffset=key==='lettuce'?52:key==='cucumber'?-8:2;
    const shopSVG=d.multiHarvest
      ?`<svg width="40" height="50" viewBox="-20 0 40 50" style="overflow:visible;flex-shrink:0"><g transform="translate(0,${fruitOffset}) scale(2.2)">${fruitBody}</g></svg>`
      :`<svg width="40" height="50" viewBox="-22 -54 44 58" style="overflow:visible;flex-shrink:0">${plantBodySVG(key,3)}</svg>`;
    return `<div class="scard${isSel?' sel':''}${!canBuy?' broke':''}" data-seed="${key}" style="cursor:${canBuy?'pointer':'not-allowed'};border-color:${borderCol};${glowStyle}">
      ${shopSVG}
      <div class="sc-info">
        <div class="sc-name" style="color:${rar.color}">${d.name}</div>
        <div class="sc-row">
          <span class="sc-cost">$${d.cost.toLocaleString()}</span>
          <span class="sc-sell">${perHarv}</span>
        </div>
        <div class="sc-meta">${d.grow/1000}s grow</div>
        <span class="sc-stock ${stockClass}">${stockLabel}</span><br>
        ${rarBadge} ${typeTag}
      </div>
    </div>`;
  }).join('');
  scroll.querySelectorAll('.scard:not(.broke)').forEach(el=>{
    el.addEventListener('click',()=>{ doShopBuy(el.dataset.seed); });
  });
}

// ══════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════
function showTT(id){
  hideFruitTT();
  document.getElementById('tt-sh-harv')?.remove(); // always clear before rebuilding
  ttId=id;
  const p=plants.find(x=>x.id===id);
  if(!p){hideTT();return;}
  const def=DEFS[p.type];
  const stageName=['Seed','Sprout','Growing','Mature'][p.stage];
  const pct=p.stage>=3?100:Math.min(100,Math.round((Date.now()-p.plantedAt)/def.grow*100));
  let previewSVG=plantBodySVG(p.type,p.stage);
  if(def.multiHarvest&&p.stage===3&&p.fruits){
    p.fruits.forEach(fr=>{
      const pr=fr.ready?1:fr.startedAt===null?0:Math.min(1,(Date.now()-fr.startedAt)/def.fruitGrow);
      if(!fr.ready&&fr.startedAt===null)return;
      previewSVG+=renderFruit(p.type,pr,fr);
    });
  }
  document.getElementById('tt-svg').innerHTML=previewSVG;
  document.getElementById('tt-name').textContent=def.name;
  document.getElementById('tt-stage').textContent=p.stage<3?`${stageName} (${pct}%)`:'Mature';
  if(def.multiHarvest){
    if(p.stage<3){
      document.getElementById('tt-detail').textContent='Growing plant…';
      document.getElementById('tt-val').textContent='';
    } else {
      const rdyF=p.fruits?p.fruits.filter(fr=>fr.ready):[];
      const growing=p.fruits?p.fruits.filter(fr=>fr.startedAt!==null&&!fr.ready).length:0;
      const queued=p.fruits?p.fruits.filter(fr=>fr.startedAt===null&&!fr.ready).length:0;
      document.getElementById('tt-detail').textContent=`${rdyF.length} ready · ${growing} growing · ${queued} queued`;
      document.getElementById('tt-val').textContent=rdyF.length>0?'Hover & click a glowing fruit to harvest':'';
    }
  } else {
    const mut=p.mutations?.length>0?' · '+p.mutations.map(m=>WEATHER_TYPES[m]?.icon).join(''):'';
    const sz=p.sizeScale?` · ${f(p.sizeScale)}×`:'';
    document.getElementById('tt-detail').textContent=`Once only · removed after harvest${mut}${sz}`;
    const price=p.stage===3?calcPlantPrice(p):0;
    document.getElementById('tt-val').textContent=p.stage===3?`Value: $${price}`:'';
    if(!def.multiHarvest && p.stage===3){
      document.getElementById('tt-rem-btn').insertAdjacentHTML('beforebegin',
        `<button class="tbt do-harv" id="tt-sh-harv" onclick="doHarvest(${p.id})">Harvest ($${price})</button>`);
    }
  }
  document.getElementById('tt').classList.add('show');
}
function hideTT(){ttId=null;document.getElementById('tt').classList.remove('show');document.getElementById('tt-sh-harv')?.remove();}

// ══════════════════════════════════════
// GAME ACTIONS
// ══════════════════════════════════════
function doShopBuy(key){
  const def=DEFS[key];
  const st=STOCK[key];
  if(!def||!st)return;
  if(coins<def.cost||st.current<=0)return;
  coins-=def.cost;
  st.current--;
  const invId=nid++;
  inventory.unshift({id:invId,itemType:'seed',plantType:key,name:def.name,cost:def.cost,acquiredAt:Date.now()});
  if(inventory.length>200)inventory.length=200;
  renderShop(); renderUI();
  showNotif('🌱 '+def.name+' seed added to bag','#7CB342');
}

function startInvPlant(invId){
  const item=inventory.find(x=>x.id===invId);
  if(!item||item.itemType!=='seed')return;
  selSeed=item.plantType;
  planting=true;
  pendingInvId=invId;
  document.getElementById('inv-panel').style.display='none';
  renderUI();
  showNotif('🌱 Click the garden to plant '+item.name,'#7CB342');
}

function doPlant(x,y){
  if(!selSeed||!planting)return;
  // Must have a matching seed in inventory
  const invItem=pendingInvId!=null?inventory.find(x=>x.id===pendingInvId):inventory.find(x=>x.itemType==='seed'&&x.plantType===selSeed);
  if(!invItem)return;
  if(x<30||x>890||y<355||y>483)return;
  // Remove seed from inventory
  inventory=inventory.filter(x=>x.id!==invItem.id);
  pendingInvId=null;
  // If no more seeds of this type in inventory, stop planting
  const hasMore=inventory.some(x=>x.itemType==='seed'&&x.plantType===selSeed);
  if(!hasMore){selSeed=null;planting=false;}
  plants.push({id:nid++,type:invItem.plantType,x,y,stage:0,plantedAt:Date.now(),fruits:null,sizeScale:0.88+Math.random()*0.24,mutations:[]});
  renderShop(); renderUI(); renderGarden();
}

// Harvest a specific fruit → goes to inventory (sell from inventory)
function doHarvestFruit(pid, fidx){
  const p=plants.find(x=>x.id===pid);
  if(!p||!p.fruits) return;
  const fr=p.fruits[fidx];
  if(!fr||!fr.ready) return;
  const price=calcFruitPrice(p.type,fr);
  inventory.unshift({id:nid++,itemType:'fruit',plantType:p.type,name:DEFS[p.type].name,value:price,scale:fr.scale,mutations:[...fr.mutations],acquiredAt:Date.now()});
  if(inventory.length>200)inventory.length=200;
  fr.ready=false;fr.startedAt=null;fr.gpIdx=0;fr.scale=1;fr.mutations=[];
  const growing=p.fruits.some(f=>f.startedAt!==null&&!f.ready);
  if(!growing)startFruitGrowing(fr,p.type);
  hideFruitTT();
  showNotif('🍅 '+DEFS[p.type].name+' → bag! Sell in inventory.','#F9A825');
  renderShop(); renderUI(); renderGarden();
}

// Harvest single-harvest plant (used by sell-all and internal)
function doHarvest(id){
  const p=plants.find(x=>x.id===id);
  if(!p) return;
  const def=DEFS[p.type];
  if(def.multiHarvest) return; // multi-harvest uses doHarvestFruit
  if(p.stage!==3) return;
  const shPrice=calcPlantPrice(p);
  inventory.unshift({id:nid++,itemType:'fruit',plantType:p.type,name:DEFS[p.type].name,value:shPrice,scale:p.sizeScale||1,mutations:[...(p.mutations||[])],acquiredAt:Date.now()});
  if(inventory.length>200)inventory.length=200;
  plants=plants.filter(x=>x.id!==id);
  showNotif('🌽 '+DEFS[p.type].name+' → bag! Sell in inventory.','#F9A825');
  hideTT();
  renderShop(); renderUI(); renderGarden();
}

function doRemove(id){
  plants=plants.filter(p=>p.id!==id);
  hideTT(); renderShop(); renderUI(); renderGarden();
}

// Sell a single inventory fruit item
function doSellInv(invId){
  const item=inventory.find(x=>x.id===invId);
  if(!item||item.itemType!=='fruit')return;
  coins+=item.value;
  inventory=inventory.filter(x=>x.id!==invId);
  renderUI(); renderInventory();
}

// Sell ALL inventory fruits at once
function doSellAll(){
  const fruits=inventory.filter(x=>x.itemType==='fruit');
  const earned=fruits.reduce((s,x)=>s+x.value,0);
  coins+=earned;
  inventory=inventory.filter(x=>x.itemType!=='fruit');
  renderUI(); renderInventory();
  if(earned>0)showNotif('💰 Sold all for '+fmtVal(earned),'#F9A825');
}

// ══════════════════════════════════════
// MAIN TICK
// ══════════════════════════════════════
setInterval(()=>{
  // ── Plant growth
  let changed=false;
  plants.forEach(p=>{
    const def=DEFS[p.type];
    if(p.stage<3){
      const ns=Math.min(3,Math.floor((Date.now()-p.plantedAt)/(def.grow/3)));
      if(ns>p.stage){
        p.stage=ns; changed=true;
        if(ns===3&&def.multiHarvest){
          p.fruits=Array.from({length:def.fruitSlots},(_,i)=>{const fr={ready:false,startedAt:null,gpIdx:0,scale:1,mutations:[]};if(i===0)startFruitGrowing(fr,p.type);return fr;});
        }
      }
    }
    if(p.stage===3&&def.multiHarvest&&p.fruits){
      p.fruits.forEach(fr=>{
        if(!fr.ready&&fr.startedAt!==null&&Date.now()-fr.startedAt>=def.fruitGrow){fr.ready=true;changed=true;const next=p.fruits.find(f=>f.startedAt===null);if(next)startFruitGrowing(next,p.type);}
      });
    }
  });

  // ── Weather expiry
  const prevWLen=activeWeathers.length;
  activeWeathers=activeWeathers.filter(aw=>Date.now()<aw.endAt);
  if(activeWeathers.length!==prevWLen){renderWeatherOverlay();renderUI();}

  // ── New weather check
  if(Date.now()>=nextWeatherCheckAt){
    nextWeatherCheckAt=Date.now()+WEATHER_CHECK_MS;
    if(Math.random()<0.65) spawnWeather();
    else renderUI();
  }

  // ── Gradual per-tick mutation drip (independent per active weather)
  if(activeWeathers.length>0){
    activeWeathers.forEach(aw=>{
      const wd=WEATHER_TYPES[aw.type];
      const tickChance=wd.mutChance/60;
      plants.forEach(p=>{
        const def=DEFS[p.type];
        if(def.multiHarvest&&p.fruits){
          p.fruits.forEach(fr=>{
            if(fr.startedAt===null)return;
            if(!fr.mutations.includes(aw.type)&&Math.random()<tickChance){
              fr.mutations.push(aw.type);
              fr.scale=Math.min(2.2,Math.max(0.4,(fr.scale||1)*wd.scaleMult));
              changed=true;
            }
          });
        } else if(!def.multiHarvest&&p.stage>0){
          if(!p.mutations.includes(aw.type)&&Math.random()<tickChance){
            p.mutations.push(aw.type);
            p.sizeScale=Math.min(2.0,Math.max(0.5,(p.sizeScale||1)*wd.scaleMult));
            changed=true;
          }
        }
      });
    });
  }

  // ── Restock check
  if(Date.now()>=nextRestockAt){doRestock();}

  // ── Restock countdown UI
  const remaining=Math.max(0,nextRestockAt-Date.now());
  const rm=Math.floor(remaining/60000);
  const rs=Math.floor((remaining%60000)/1000);
  const clockTime=new Date(nextRestockAt);
  const hh=clockTime.getHours().toString().padStart(2,'0');
  const mm=clockTime.getMinutes().toString().padStart(2,'0');
  const ss=clockTime.getSeconds().toString().padStart(2,'0');
  document.getElementById('restock-timer').textContent=`${hh}:${mm}:${ss} (${rm}:${rs.toString().padStart(2,'0')})`;
  const prog=(RESTOCK_MS-remaining)/RESTOCK_MS;
  document.getElementById('restock-bar-fill').style.width=`${Math.min(100,prog*100)}%`;

  renderGarden();
  if(changed){renderUI();renderShop();}
  if(ttId!==null)showTT(ttId);
},800);

// EVENTS

document.getElementById('gsvg').addEventListener('click',e=>{
  if(e.target.closest('[data-pid]'))return;
  if(selSeed&&planting){
    const svg=document.getElementById('gsvg');
    const pt=svg.createSVGPoint();
    pt.x=e.clientX; pt.y=e.clientY;
    const svgP=pt.matrixTransform(svg.getScreenCTM().inverse());
    doPlant(svgP.x,svgP.y);
  } else {
    hideTT();
  }
});

document.getElementById('plants-g').addEventListener('click',e=>{
  // Fruit click — show individual fruit tooltip
  const fg=e.target.closest('.fruit-g');
  if(fg&&fg.dataset.ready==='1'){
    e.stopPropagation();
    showFruitTT(parseInt(fg.dataset.fpid), parseInt(fg.dataset.fidx));
    return;
  }
  // Plant hit area click — show plant tooltip
  const el=e.target.closest('[data-pid]');
  if(!el)return;
  e.stopPropagation();
  hideFruitTT();
  showTT(parseInt(el.dataset.pid));
});

// Hover outline — only on ripe fruits (not whole plants)
const OUTLINE_FILTER='drop-shadow(1.5px 0 0 white) drop-shadow(-1.5px 0 0 white) drop-shadow(0 1.5px 0 white) drop-shadow(0 -1.5px 0 white)';

document.getElementById('plants-g').addEventListener('mouseover',e=>{
  // Ripe fruit outline
  const fg=e.target.closest('.fruit-g');
  if(fg&&fg.dataset.ready==='1'){
    const fb=fg.querySelector('.fruit-body');
    if(fb) fb.style.filter=OUTLINE_FILTER;
    return;
  }
  // Single-harvest mature plant outline — apply to the inner body group
  const pg=e.target.closest('g[data-pid]');
  if(pg){
    const pid=parseInt(pg.dataset.pid);
    const p=plants.find(x=>x.id===pid);
    if(p&&!DEFS[p.type]?.multiHarvest&&p.stage===3){
      // Find the first <g> child that contains the plant body (not the hit ellipse)
      const bodyG=pg.querySelector('g:not(.fruit-g)');
      if(bodyG) bodyG.style.filter=OUTLINE_FILTER;
    }
  }
});
document.getElementById('plants-g').addEventListener('mouseout',e=>{
  const fg=e.target.closest('.fruit-g');
  if(fg&&!fg.contains(e.relatedTarget)){
    const fb=fg.querySelector('.fruit-body');
    if(fb) fb.style.filter='';
    return;
  }
  const pg=e.target.closest('g[data-pid]');
  if(pg&&!pg.contains(e.relatedTarget)){
    const bodyG=pg.querySelector('g:not(.fruit-g)');
    if(bodyG) bodyG.style.filter='';
  }
});

// ══════════════════════════════════════
// WEBSOCKET — connects to this same server
// ══════════════════════════════════════
let ws = null;
let wsConnected = false;

function initWS(){
  // Only connect when actually served from a server (not opened as a local file)
  if(!location.host){
    console.log('[Garden] Running locally — server features disabled.');
    return;
  }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url   = `${proto}//${location.host}`;
  ws = new WebSocket(url);

  ws.addEventListener('open', () => {
    wsConnected = true;
    console.log('[Garden] Server connected ✓');
  });

  ws.addEventListener('message', (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    switch(data.type){
      case 'weather_start': {
        const wd = WEATHER_TYPES[data.weatherType];
        if(!wd) return;
        activeWeathers = activeWeathers.filter(aw => aw.type !== data.weatherType);
        activeWeathers.push({type: data.weatherType, endAt: data.endAt});
        renderWeatherOverlay(); renderGarden(); renderUI();
        showNotif(`${wd.icon} ${wd.label} rolls in worldwide!`, wd.color);
        break;
      }
      case 'weather_sync': {
        activeWeathers = (data.weathers || []).filter(aw => Date.now() < aw.endAt);
        renderWeatherOverlay(); renderGarden(); renderUI();
        break;
      }
      case 'weather_clear': {
        activeWeathers = [];
        renderWeatherOverlay(); renderUI();
        showNotif('☀ Weather cleared worldwide', '#90A4AE');
        break;
      }
      case 'announce': {
        showNotif(`📢 ${data.msg}`, data.color || '#FF8F00');
        break;
      }
      case 'stock_sync': {
        // Server sends full stock snapshot (on join or after restock)
        Object.keys(data.stock||{}).forEach(k=>{
          if(STOCK[k]!==undefined) STOCK[k].current=data.stock[k];
        });
        renderShop();
        if(data.restock) showNotif('🌿 Shop restocked!','#7CB342');
        break;
      }
      case 'stock_update': {
        // Single item changed (someone bought, or admin restocked)
        if(data.key&&STOCK[data.key]!==undefined){
          STOCK[data.key].current=data.current;
          renderShop();
        }
        break;
      }
      case 'buy_denied': {
        // Server rejected purchase (race condition — someone else bought last one)
        showNotif(`⚠ ${DEFS[data.key]?.name||data.key} just sold out!`,'#FF7043');
        renderShop();
        break;
      }
      case 'coins': {
        coins += data.amount || 0;
        renderUI();
        showNotif(`💰 Everyone got $${data.amount}!`, '#FFD54F');
        break;
      }
    }
  });

  ws.addEventListener('close', () => {
    wsConnected = false;
    console.log('[Garden] Server disconnected — retrying in 5s…');
    setTimeout(initWS, 5000);
  });

  ws.addEventListener('error', () => ws.close());
}

function wsSend(data){
  if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
}

// ══════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════
function showNotif(msg, color='#FFD54F'){
  const bar=document.getElementById('notif-bar');
  if(!bar)return;
  const el=document.createElement('div');
  el.className='notif';
  el.textContent=msg;
  el.style.color=color;
  el.style.borderColor=color+'55';
  bar.appendChild(el);
  setTimeout(()=>el.remove(), 4100);
}

// ADMIN PANEL
// ══════════════════════════════════════
function openAdminPanel(){
  const wb=document.getElementById('adm-weather-btns');
  wb.innerHTML=Object.entries(WEATHER_TYPES).map(([key,wd])=>
    `<button class="adm-btn" style="border-color:${wd.color}44;color:${wd.color}" onclick="adminWeather('${key}')">${wd.icon} ${wd.label}</button>`
  ).join('');
  const sb=document.getElementById('adm-stock-btns');
  sb.innerHTML=Object.entries(STOCK).map(([key])=>{
    const rar=RARITIES[DEFS[key].rarity];
    return `<button class="adm-btn" style="border-color:${rar.color}44;color:${rar.color}" onclick="adminRestock('${key}')">${DEFS[key].name}</button>`;
  }).join('');
  const panel=document.getElementById('adm-panel');
  panel.style.display=panel.style.display==='flex'?'none':'flex';
}

function adminWeather(type){
  const wd=WEATHER_TYPES[type];
  if(wsConnected){
    wsSend({type:'admin_weather', weatherType:type, dur:wd.dur});
  } else {
    // Offline fallback
    activeWeathers=activeWeathers.filter(aw=>aw.type!==type);
    activeWeathers.push({type, endAt:Date.now()+wd.dur});
    renderWeatherOverlay(); renderGarden(); renderUI();
    showNotif(`${wd.icon} ${wd.label} activated (offline)`, wd.color);
  }
}

function adminRestock(key){
  if(wsConnected){
    wsSend({type:'admin_restock', key});
  } else {
    STOCK[key].current=STOCK[key].max;
    renderShop();
    showNotif(`📦 ${DEFS[key].name} restocked`, RARITIES[DEFS[key].rarity].color);
  }
}

function adminAnnounce(){
  const input=document.getElementById('adm-msg');
  const msg=input.value.trim();
  if(!msg)return;
  if(wsConnected){
    wsSend({type:'admin_announce', msg, color:'#FF8F00'});
  } else {
    showNotif(`📢 ${msg}`, '#FF8F00');
  }
  input.value='';
}

function addToInventory(item){
  inventory.unshift(item);
  if(inventory.length>200)inventory.length=200;
}
function fmtVal(n){
  if(n>=1000000)return '$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)return '$'+(n/1000).toFixed(1)+'k';
  return '$'+n;
}
function renderInventory(){
  const grid=document.getElementById('inv-grid');
  const empty=document.getElementById('inv-empty');
  const list=inventory.filter(it=>invTab==='all'||it.itemType===invTab);
  if(!list.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(it=>{
    const d=DEFS[it.plantType]||{};
    const rc=RARITIES[d.rarity]||{color:'#9E9E9E',label:'?'};
    let previewSVG=it.itemType==='seed'?plantBodySVG(it.plantType,0):oneFruitSVG(it.plantType,1);
    const traits=it.itemType==='seed'
      ?`${d.multiHarvest?'Perennial':'Once only'}`
      :`Size ${(it.scale||1).toFixed(2)}×`;
    const muts=it.mutations&&it.mutations.length?it.mutations.map(m=>WEATHER_TYPES[m]?.icon||'').join(' '):'';
    const valStr=it.itemType==='seed'?`Paid ${fmtVal(it.cost)}`:`Value ${fmtVal(it.value)}`;
    const typeLabel=it.itemType==='seed'?'SEED':'HARVEST';
    const actionBtn=it.itemType==='seed'
      ?`<button onclick="startInvPlant(${it.id})" style="margin-top:5px;background:#1A3A10;color:#7CB342;border:1px solid #2E6B1A;border-radius:5px;padding:4px 10px;font-size:9px;font-family:inherit;cursor:pointer;font-weight:bold;width:100%">🌱 Plant</button>`
      :`<button onclick="doSellInv(${it.id})" style="margin-top:5px;background:#2A1608;color:#E07030;border:1px solid #5C2A10;border-radius:5px;padding:4px 10px;font-size:9px;font-family:inherit;cursor:pointer;font-weight:bold;width:100%">💰 Sell</button>`;
    return `<div class="inv-card" style="border-color:${rc.color}33">
      <span class="inv-card-type ${it.itemType}">${typeLabel}</span>
      <svg width="38" height="44" viewBox="-20 -46 40 50" style="overflow:visible">${previewSVG}</svg>
      <div class="inv-card-name" style="color:${rc.color}">${it.name||d.name||'?'}</div>
      <div class="inv-card-trait">${traits}</div>
      <div class="inv-card-muts">${muts||'&nbsp;'}</div>
      <div class="inv-card-val">${valStr}</div>
      ${actionBtn}
    </div>`;
  }).join('');
  document.querySelectorAll('.inv-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===invTab));
}
document.getElementById('inv-btn').addEventListener('click',()=>{
  const p=document.getElementById('inv-panel');
  p.style.display=p.style.display==='flex'?'none':'flex';
  if(p.style.display==='flex')renderInventory();
});
document.querySelectorAll('.inv-tab').forEach(b=>{
  b.addEventListener('click',()=>{invTab=b.dataset.tab;renderInventory();});
});

// ══════════════════════════════════════
// AUTH & SAVE / LOAD
// ══════════════════════════════════════
let authToken = localStorage.getItem('garden_token') || null;
let authUser  = localStorage.getItem('garden_user')  || null;
let isGuest   = false;
let authMode  = 'login'; // 'login' | 'register'
let saveTimer = null;

function switchAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-register').classList.toggle('active',mode==='register');
  document.getElementById('auth-submit').textContent=mode==='login'?'Log In':'Create Account';
  document.getElementById('auth-err').textContent='';
}

async function doAuth(){
  const username=document.getElementById('auth-user').value.trim();
  const password=document.getElementById('auth-pass').value;
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!username||!password){errEl.textContent='Please fill in both fields.';return;}
  const btn=document.getElementById('auth-submit');
  btn.disabled=true;btn.textContent='…';
  try{
    const res=await fetch(`/auth/${authMode}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data=await res.json();
    if(!res.ok){errEl.textContent=data.error||'Error';btn.disabled=false;btn.textContent=authMode==='login'?'Log In':'Create Account';return;}
    authToken=data.token; authUser=data.username;
    localStorage.setItem('garden_token',authToken);
    localStorage.setItem('garden_user',authUser);
    await loadGameState();
    startGame();
  }catch(e){
    errEl.textContent='Server unreachable — try again.';
    btn.disabled=false;btn.textContent=authMode==='login'?'Log In':'Create Account';
  }
}

function startGuest(){
  isGuest=true;
  startGame();
}

function doLogout(){
  // Save first
  if(!isGuest) saveGameState(true);
  authToken=null; authUser=null; isGuest=false;
  localStorage.removeItem('garden_token');
  localStorage.removeItem('garden_user');
  clearInterval(saveTimer);
  // Reset game state
  coins=50; plants=[]; inventory=[]; nid=0;
  activeWeathers=[]; hideTT(); hideFruitTT();
  selSeed=null; planting=false; pendingInvId=null;
  document.getElementById('logout-btn').style.display='none';
  document.getElementById('user-badge').style.display='none';
  document.getElementById('save-ind').style.display='none';
  document.getElementById('auth-overlay').style.display='flex';
  document.getElementById('auth-user').value='';
  document.getElementById('auth-pass').value='';
  document.getElementById('auth-err').textContent='';
  renderGarden(); renderUI(); renderShop();
}

function startGame(){
  document.getElementById('auth-overlay').style.display='none';
  if(!isGuest){
    document.getElementById('user-badge').style.display='inline';
    document.getElementById('user-badge').textContent='👤 '+authUser;
    document.getElementById('logout-btn').style.display='inline';
    // Auto-save every 60s
    saveTimer=setInterval(()=>saveGameState(false),60000);
  }
  renderGarden(); renderUI(); renderShop();
}

async function loadGameState(){
  if(isGuest||!authToken) return;
  try{
    const res=await fetch('/game/load',{headers:{Authorization:'Bearer '+authToken}});
    if(!res.ok) return;
    const {state}=await res.json();
    if(!state) return; // new account, fresh game
    coins    = state.coins    ?? 50;
    plants   = state.plants   ?? [];
    inventory= state.inventory?? [];
    nid = Math.max(
      ...plants.map(p=>p.id+1),
      ...inventory.map(x=>x.id+1),
      nid, 0
    );
    showNotif('💾 Progress loaded for '+authUser,'#7CB342');
  }catch(e){
    console.log('[Save] Load failed:',e.message);
  }
}

async function saveGameState(silent=false){
  if(isGuest||!authToken) return;
  const state={coins, plants, inventory, savedAt:Date.now()};
  try{
    const res=await fetch('/game/save',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},
      body:JSON.stringify({state})
    });
    if(res.ok&&!silent){
      const ind=document.getElementById('save-ind');
      ind.style.display='inline';
      clearTimeout(ind._t);
      ind._t=setTimeout(()=>{ind.style.display='none';},2500);
    }
  }catch(e){
    console.log('[Save] Save failed:',e.message);
  }
}

// Save on harvest and on plant purchase
const _origDoShopBuy=doShopBuy;
function doShopBuy(key){_origDoShopBuy(key);saveGameState(true);}
const _origDoHarvestFruit=doHarvestFruit;
function doHarvestFruit(pid,fidx){_origDoHarvestFruit(pid,fidx);saveGameState(true);}
const _origDoHarvest=doHarvest;
function doHarvest(id){_origDoHarvest(id);saveGameState(true);}

// Keyboard: Enter submits auth form
document.getElementById('auth-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
document.getElementById('auth-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-pass').focus();});

// Auto-login if token saved — or skip auth entirely if running locally
(async function tryAutoLogin(){
  if(!location.host){
    // Local file — no server, just play as guest
    isGuest=true;
    startGame();
    return;
  }
  if(!authToken||!authUser){
    document.getElementById('auth-overlay').style.display='flex';
    return;
  }
  // Verify token is still valid by loading state
  try{
    const res=await fetch('/game/load',{headers:{Authorization:'Bearer '+authToken}});
    if(!res.ok){authToken=null;authUser=null;localStorage.removeItem('garden_token');localStorage.removeItem('garden_user');document.getElementById('auth-overlay').style.display='flex';return;}
    const {state}=await res.json();
    if(state){
      coins=state.coins??50; plants=state.plants??[]; inventory=state.inventory??[];
      nid=Math.max(...plants.map(p=>p.id+1),...inventory.map(x=>x.id+1),nid,0);
    }
    startGame();
    if(state) showNotif('💾 Welcome back, '+authUser+'!','#7CB342');
  }catch{
    // Server not available, start as guest
    startGuest();
  }
})();

initWS();
renderShop();
renderUI();
renderGarden();
</script>
